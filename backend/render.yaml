# Render Blueprint — Backend Service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ats-resume-builder-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: ats_resume_builder
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.4"
