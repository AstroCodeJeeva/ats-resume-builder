<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="100" r="200" fill="#6366f1" opacity="0.08"/>
  <circle cx="200" cy="500" r="150" fill="#a855f7" opacity="0.06"/>

  <!-- Logo icon -->
  <rect x="80" y="200" width="64" height="64" rx="14" fill="url(#accent)"/>
  <text x="112" y="242" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="32" fill="white">A</text>

  <!-- Title -->
  <text x="160" y="236" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="42" fill="white">ATS Resume Builder</text>

  <!-- Subtitle -->
  <text x="82" y="300" font-family="Inter,system-ui,sans-serif" font-weight="400" font-size="24" fill="#a5b4fc">Build, optimize, and score your resume against ATS systems.</text>
  <text x="82" y="336" font-family="Inter,system-ui,sans-serif" font-weight="400" font-size="24" fill="#a5b4fc">Export polished PDFs in minutes — powered by AI.</text>

  <!-- Feature pills -->
  <rect x="82" y="380" width="140" height="36" rx="18" fill="white" opacity="0.1"/>
  <text x="152" y="404" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="14" fill="#c7d2fe">ATS Scoring</text>

  <rect x="240" y="380" width="160" height="36" rx="18" fill="white" opacity="0.1"/>
  <text x="320" y="404" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="14" fill="#c7d2fe">AI Optimization</text>

  <rect x="418" y="380" width="140" height="36" rx="18" fill="white" opacity="0.1"/>
  <text x="488" y="404" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="14" fill="#c7d2fe">PDF Export</text>

  <rect x="576" y="380" width="160" height="36" rx="18" fill="white" opacity="0.1"/>
  <text x="656" y="404" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="14" fill="#c7d2fe">4 Templates</text>

  <!-- Resume mockup on the right -->
  <g transform="translate(780, 80)">
    <rect width="320" height="440" rx="16" fill="white" opacity="0.95"/>
    <rect width="320" height="60" rx="16" fill="#4f46e5"/>
    <rect y="48" width="320" height="12" fill="#4f46e5"/>
    <circle cx="50" cy="30" r="16" fill="white" opacity="0.2"/>
    <rect x="78" y="22" width="100" height="8" rx="4" fill="white" opacity="0.5"/>
    <rect x="78" y="36" width="70" height="6" rx="3" fill="white" opacity="0.3"/>

    <rect x="30" y="80" width="120" height="8" rx="4" fill="#e0e7ff"/>
    <rect x="30" y="100" width="260" height="5" rx="2.5" fill="#e2e8f0"/>
    <rect x="30" y="112" width="240" height="5" rx="2.5" fill="#e2e8f0"/>
    <rect x="30" y="124" width="220" height="5" rx="2.5" fill="#e2e8f0"/>

    <rect x="30" y="150" width="100" height="8" rx="4" fill="#e0e7ff"/>
    <rect x="30" y="170" width="260" height="5" rx="2.5" fill="#e2e8f0"/>
    <rect x="30" y="182" width="250" height="5" rx="2.5" fill="#e2e8f0"/>
    <rect x="30" y="194" width="230" height="5" rx="2.5" fill="#e2e8f0"/>
    <rect x="30" y="206" width="200" height="5" rx="2.5" fill="#e2e8f0"/>

    <rect x="30" y="232" width="80" height="8" rx="4" fill="#e0e7ff"/>
    <rect x="30" y="252" width="180" height="6" rx="3" fill="#f1f5f9"/>
    <rect x="30" y="252" width="150" height="6" rx="3" fill="#6366f1"/>
    <rect x="30" y="266" width="180" height="6" rx="3" fill="#f1f5f9"/>
    <rect x="30" y="266" width="130" height="6" rx="3" fill="#10b981"/>
    <rect x="30" y="280" width="180" height="6" rx="3" fill="#f1f5f9"/>
    <rect x="30" y="280" width="160" height="6" rx="3" fill="#f59e0b"/>

    <!-- Score badge -->
    <circle cx="270" cy="100" r="30" fill="#10b981"/>
    <text x="270" y="97" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="16" fill="white">92</text>
    <text x="270" y="110" text-anchor="middle" font-family="Inter,sans-serif" font-weight="500" font-size="8" fill="white" opacity="0.7">ATS</text>
  </g>

  <!-- URL -->
  <text x="82" y="560" font-family="Inter,system-ui,sans-serif" font-weight="500" font-size="16" fill="#64748b">ats-resume-builder-mu.vercel.app</text>
</svg>
